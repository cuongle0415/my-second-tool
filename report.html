<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funnel – tinh-luong-ops</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f7;
      color: #1D1D1F;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2rem;
      max-width: 720px;
      margin: 0 auto;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    .title {
      font-size: 1.4rem;
      font-weight: 800;
      color: #1D1D1F;
      margin-bottom: 0.35rem;
    }

    .title span {
      color: #F37500;
    }

    .subtitle {
      font-size: 0.85rem;
      font-weight: 500;
      color: #5a5a60;
      margin-bottom: 2rem;
      line-height: 1.5;
      padding: 0.6rem 0.9rem;
      background: #fff3e0;
      border-left: 3px solid #F37500;
      border-radius: 0 8px 8px 0;
    }

    .subtitle strong {
      color: #C45F00;
    }

    .chart-wrap {
      position: relative;
      width: 100%;
      height: 320px;
    }

    .stats-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.75rem;
      flex-wrap: wrap;
    }

    .stat-chip {
      flex: 1;
      min-width: 130px;
      background: #f5f5f7;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      text-align: center;
    }

    .stat-chip .num {
      font-size: 1.6rem;
      font-weight: 800;
      color: #F37500;
      line-height: 1;
    }

    .stat-chip .label {
      font-size: 0.72rem;
      font-weight: 600;
      color: #5a5a60;
      margin-top: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-chip .pct {
      font-size: 0.78rem;
      font-weight: 700;
      color: #1D1D1F;
      margin-top: 0.2rem;
    }

    .footer {
      margin-top: 1.5rem;
      font-size: 0.72rem;
      color: #aeaeb2;
      text-align: right;
    }

    @media (max-width: 480px) {
      .card { padding: 1.25rem; }
      .title { font-size: 1.1rem; }
      .chart-wrap { height: 240px; }
      .stat-chip .num { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="title">Funnel tool <span>tinh-luong-ops</span></div>
  <div class="subtitle">
    Drop-off lớn nhất ở bước <strong>page_view → button_click</strong>:
    100% → 57.7% — 42 trong 97 user vào tool rồi bỏ mà không tương tác.
  </div>

  <div class="chart-wrap">
    <canvas id="funnelChart"></canvas>
  </div>

  <div class="stats-row">
    <div class="stat-chip">
      <div class="num">97</div>
      <div class="label">page_view</div>
      <div class="pct">100%</div>
    </div>
    <div class="stat-chip">
      <div class="num">56</div>
      <div class="label">button_click</div>
      <div class="pct">57.7%</div>
    </div>
    <div class="stat-chip">
      <div class="num">31</div>
      <div class="label">result_shown</div>
      <div class="pct">31.9%</div>
    </div>
    <div class="stat-chip">
      <div class="num">11</div>
      <div class="label">result_copy</div>
      <div class="pct">11.3%</div>
    </div>
  </div>

  <div class="footer">Data: 30 Apr – 05 May 2026 · 97 sessions · 53 unique users</div>
</div>

<script>
  const labels = ['page_view', 'button_click_main', 'result_shown', 'result_copy'];
  const counts = [97, 56, 31, 11];
  const pcts   = [100, 57.7, 31.9, 11.3];

  const bgColors = counts.map((_, i) => {
    const alphas = [1, 0.78, 0.52, 0.32];
    const hex = '#F37500';
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alphas[i]})`;
  });

  const ctx = document.getElementById('funnelChart').getContext('2d');

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Sessions',
        data: counts,
        backgroundColor: bgColors,
        borderRadius: 8,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const i = ctx.dataIndex;
              return `  ${counts[i]} sessions (${pcts[i]}%)`;
            }
          },
          backgroundColor: '#1D1D1F',
          titleColor: '#fff',
          bodyColor: '#ffffffcc',
          padding: 10,
          cornerRadius: 8,
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            font: { size: 11, weight: '600' },
            color: '#5a5a60',
          }
        },
        y: {
          beginAtZero: true,
          max: 110,
          grid: { color: '#f0f0f0' },
          ticks: {
            stepSize: 20,
            font: { size: 11 },
            color: '#aeaeb2',
          }
        }
      },
      animation: {
        duration: 800,
        easing: 'easeOutQuart'
      }
    },
    plugins: [{
      id: 'topLabels',
      afterDatasetsDraw(chart) {
        const { ctx, data } = chart;
        data.datasets[0].data.forEach((val, i) => {
          const meta = chart.getDatasetMeta(0);
          const bar  = meta.data[i];
          ctx.save();
          ctx.font = 'bold 12px -apple-system, sans-serif';
          ctx.fillStyle = '#1D1D1F';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText(`${val}  (${pcts[i]}%)`, bar.x, bar.y - 6);
          ctx.restore();
        });
      }
    }]
  });
</script>

</body>
</html>
